<header
  id="topbar"
  class="fixed top-0 left-0 right-0 z-50 bg-transparent transition-all duration-300"
>
  <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
    <a href="{{ROOT}}/" class="relative z-[70] flex items-center shrink-0">
      <img
        src="{{ROOT}}/source/resources/nura-header.png"
        alt="전국대학교로켓연합회 로고"
        class="block h-5 md:h-7 w-auto max-w-[240px] md:max-w-[520px] object-contain translate-y-[1px]"
      />
    </a>

    <nav class="hidden md:flex items-center gap-8 text-base font-medium">
      <a href="{{ROOT}}/" data-page="overview" class="nav-link text-gray-300 hover:text-white transition">Overview</a>
      <a href="{{ROOT}}/about/" data-page="about" class="nav-link text-gray-300 hover:text-white transition">About</a>

      <div class="activities-dropdown">
        <a
          href="{{ROOT}}/activities/"
          data-page="activities"
          class="nav-link text-gray-300 hover:text-white transition inline-flex items-center gap-2"
        >
          Activities
          <svg
            class="w-4 h-4 transition-transform duration-200"
            viewBox="0 0 20 20"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              fill-rule="evenodd"
              d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
              clip-rule="evenodd"
            />
          </svg>
        </a>

        <div class="activities-dropdown-menu">
          <a href="{{ROOT}}/activities/conference.html" class="activities-dropdown-item">
            <span>학술대회</span>
            <span class="activities-dropdown-arrow">→</span>
          </a>
          <a href="{{ROOT}}/activities/launch.html" class="activities-dropdown-item">
            <span>발사대회</span>
            <span class="activities-dropdown-arrow">→</span>
          </a>
        </div>
      </div>

      <a href="{{ROOT}}/partnership/" data-page="partnership" class="nav-link text-gray-300 hover:text-white transition">Partnership</a>
      <a href="{{ROOT}}/resources/" data-page="resources" class="nav-link text-gray-300 hover:text-white transition">Resources</a>
    </nav>

    <button
      id="mobile-menu-btn"
      type="button"
      aria-label="모바일 메뉴 열기"
      aria-expanded="false"
      class="md:hidden relative z-[70] inline-flex items-center justify-center w-11 h-11 rounded-xl border border-white/15 bg-white/5 hover:bg-white/10 transition text-white"
    >
      <svg id="menu-icon-open" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
      <svg id="menu-icon-close" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M6 6l12 12M18 6L6 18" />
      </svg>
    </button>
  </div>

  <div
    id="mobile-menu"
    class="fixed inset-0 z-[60] hidden md:hidden bg-slate-950/88 backdrop-blur-xl opacity-0 pointer-events-none transition-opacity duration-300 ease-out"
  >
    <div class="mobile-menu-panel flex flex-col justify-between min-h-screen px-6 pt-20 pb-10 transform transition duration-300 ease-out opacity-0 translate-y-3">
      <div class="flex flex-col gap-1">
        <a href="{{ROOT}}/" data-page="overview" class="nav-link py-4 text-2xl font-semibold text-white border-b border-white/10">Overview</a>
        <a href="{{ROOT}}/about/" data-page="about" class="nav-link py-4 text-2xl font-semibold text-white border-b border-white/10">About</a>

        <div class="border-b border-white/10">
          <button
            id="mobile-activities-toggle"
            type="button"
            class="w-full py-4 text-2xl font-semibold text-white flex items-center justify-between"
            aria-expanded="false"
            aria-controls="mobile-activities-submenu"
          >
            <span>Activities</span>
            <svg
              id="mobile-activities-arrow"
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5 text-gray-300 transition-transform duration-300"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M6 9l6 6 6-6" />
            </svg>
          </button>

          <div
            id="mobile-activities-submenu"
            class="max-h-0 overflow-hidden transition-all duration-300 ease-out"
          >
            <div class="pb-4">
              <a
                href="{{ROOT}}/activities/conference.html"
                class="block py-2 text-xl font-medium text-gray-300 hover:text-white transition"
              >
                학술대회
              </a>
              <a
                href="{{ROOT}}/activities/launch.html"
                class="block py-2 text-xl font-medium text-gray-300 hover:text-white transition"
              >
                발사대회
              </a>
            </div>
          </div>
        </div>

        <a href="{{ROOT}}/partnership/" data-page="partnership" class="nav-link py-4 text-2xl font-semibold text-white border-b border-white/10">Partnership</a>
        <a href="{{ROOT}}/resources/" data-page="resources" class="nav-link py-4 text-2xl font-semibold text-white border-b border-white/10">Resources</a>
      </div>

      <div class="pt-10 text-sm text-gray-400">National University Rocket Association</div>
    </div>
  </div>
</header>
