  function createHistoryEntry(entry) {
    const cardClass = entry.featured ? 'border-blue-400/20 bg-white/10' : 'border-white/10 bg-white/[0.04]';
    const badgeClass = entry.featured ? 'border-blue-400/30 bg-blue-500/12 text-blue-200' : 'border-white/10 bg-white/[0.04] text-white';
    const itemsHtml = entry.items.map((item) => `<li class="text-gray-300 leading-7 break-keep">${item}</li>`).join('');
    return `
      <article class="history-entry rounded-[1.75rem] border p-6 md:p-7 ${cardClass}" data-year="${entry.year}">
        <div class="flex flex-col md:flex-row gap-5 md:gap-7">
          <div class="shrink-0">
            <div class="history-entry-year text-4xl md:text-5xl font-black text-white">${entry.year}</div>
            ${entry.featured ? `<div class="mt-4 inline-flex rounded-full border px-3 py-1 text-xs font-semibold tracking-[0.18em] uppercase ${badgeClass}">Featured</div>` : ''}
          </div>
          <div class="min-w-0 flex-1"><ul class="space-y-2.5">${itemsHtml}</ul></div>
        </div>
      </article>`;
  }

  (function renderHistoryDialTimeline() {

    const entryYears = historyData.map((entry) => entry.year);
    const startYear = Math.min(...entryYears);
    const endYear = Math.max(...entryYears);
    const years = [];
    for (let year = startYear; year <= endYear; year += 1) years.push(year);
    reel.innerHTML = years.map((year) => `<div class="history-year-item" data-year="${year}">${year}</div>`).join('');

    const yearItems = Array.from(reel.querySelectorAll('.history-year-item'));

    function setReelPositionByYear(yearValue) {

      const dialHeight = dial.clientHeight;
      const indexFloat = yearValue - startYear;
      const offset = dialHeight / 2 - itemHeight / 2 - indexFloat * itemHeight;
      reel.style.transform = `translate3d(0, ${offset}px, 0)`;
    }
    function setActiveYear(year) {
      const numericYear = Number(year);
      if (!years.includes(numericYear)) return;
      setReelPositionByYear(numericYear);
      yearItems.forEach((item) => item.classList.toggle('is-active', Number(item.dataset.year) === numericYear));
      entries.forEach((entry) => entry.classList.toggle('is-active', Number(entry.dataset.year) === numericYear));
    }
    function getActivationCenterY() { return window.innerHeight * 0.42; }
    function updateStartSpacerPrecise() { if (startSpacer) startSpacer.style.height = `${Math.max(getActivationCenterY() - 100, 0)}px`; }
    function updateEndSpacerPrecise() {
      if (!endSpacer || !entries.length) return;
      const lastEntry = entries[entries.length - 1];
      const needed = Math.max(getActivationCenterY() - (lastEntry.offsetHeight * 0.5), 0);
      endSpacer.style.height = `${needed}px`;
    }
    function syncFromScroll() {
      const centerY = getActivationCenterY();
      let activeEntry = entries[0];
      let minDistance = Infinity;
      entries.forEach((entry) => {
        const rect = entry.getBoundingClientRect();
        const entryCenter = rect.top + rect.height / 2;
        const distance = Math.abs(entryCenter - centerY);
        if (distance < minDistance) { minDistance = distance; activeEntry = entry; }
      });
      if (activeEntry) setActiveYear(Number(activeEntry.dataset.year));
    }
    function handleResize() {
      updateStartSpacerPrecise();
      updateEndSpacerPrecise();
      requestAnimationFrame(syncFromScroll);
    }
    setActiveYear(startYear);
    handleResize();
    requestAnimationFrame(() => requestAnimationFrame(syncFromScroll));
    window.addEventListener('scroll', syncFromScroll, { passive: true });
    window.addEventListener('resize', handleResize);
    window.addEventListener('load', handleResize);
  })();
</script>
