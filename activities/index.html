<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NURA | Activities</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../source/resources/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../source/resources/favicon-16x16.png" />
    <link rel="shortcut icon" type="image/png" href="../source/resources/favicon-32x32.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <script src="../data/shared-layout.js"></script>
    <style>
  html { scroll-behavior: smooth; }
  html, body {
    margin: 0;
    padding: 0;
    background-color: #000;
    overflow-x: hidden;
  }

  body {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    color: #fff;
  }

  .page-shell {
    min-height: 100vh;
    background: #000;
  }

  .activity-grid {
    display: flex;
    flex-direction: column;
  }

  .activity-hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    overflow: hidden;
    background: #000;
  }

  .activity-hero__image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    transform: scale(1.01);
  }

  .activity-hero::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      linear-gradient(
        180deg,
        rgba(0,0,0,0.42) 0%,
        rgba(0,0,0,0.18) 28%,
        rgba(0,0,0,0.34) 55%,
        rgba(0,0,0,0.50) 100%
      );
  }

  .activity-hero__content {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    align-items: flex-end;
  }

  .activity-hero__inner {
    padding-left: clamp(1.5rem, 4vw, 4rem);
    padding-right: 1.5rem;
    padding-bottom: clamp(3rem, 8vw, 6rem);
  }

  .activity-label {
    margin: 0;
    font-size: clamp(2rem, 4vw, 3.6rem);
    line-height: 1;
    font-weight: 500;
    letter-spacing: -0.04em;
    text-transform: uppercase;
    color: #fff;
  }

      .activity-label--launch {
  font-size: 35px;
  font-weight: 400;
  letter-spacing: 0.01em;
  line-height: 1;
}

    .activity-label--conference {
  font-size: 35px;
  font-weight: 400;
  letter-spacing: 0.01em;
  line-height: 1;
}

  .activity-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 1.25rem;
    width: 176px;
    height: 58px;
    border: 2px solid rgba(255,255,255,0.92);
    background: transparent;
    color: #fff;
    text-decoration: none;
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.01em;
    text-transform: uppercase;
  transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  }

 .activity-btn:hover {
  background: #71b3e2; /* 파란색 */
  border-color: #71b3e2;
  color: #000000;
}

  /* 섹션별 이미지 위치 미세조정 */
  .activity-hero--conference .activity-hero__image {
    object-position: center center;
  }

  .activity-hero--launch .activity-hero__image {
    object-position: center center;
  }

  .activity-hero--conference .activity-hero__image {
    object-position: center center;
  }

  /* 모바일: 사진처럼 한 화면에 여러 카드가 보이게 */
  @media (max-width: 767px) {
    .activity-hero {
      min-height: 38vh;
    }

    .activity-hero__content {
      min-height: 38vh;
      align-items: flex-end;
    }

    .activity-hero__inner {
      padding-left: 1.25rem;
      padding-right: 1.25rem;
      padding-bottom: 1.9rem;
    }

    .activity-label {
      font-size: 2.15rem;
    }
    
    .activity-btn {
      width: 170px;
      height: 54px;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
}


  /* 데스크톱: 카드처럼 둥글게 하지 말고 꽉 차게 */
  @media (min-width: 768px) {
    .activities-wrap {
      padding: 0;
    }

    .activity-grid {
      gap: 0;
    }

    .activity-hero {
      border: none;
      border-radius: 0;
      box-shadow: none;
    }
  }
</style>
  </head>
  <body class="bg-black text-white min-h-screen overflow-x-hidden" data-current-page="activities" data-base-path="..">
    <div class="page-shell flex flex-col">
      <div data-shared-header></div>

      <main class="w-full flex-1 flex flex-col bg-black">

  <section class="activity-grid">

    <article class="activity-hero activity-hero--conference">
      <img
        src="../source/overview/IMG_0651.jpg"
        alt="추진 시스템 대표 이미지"
        class="activity-hero__image"
      />
      <div class="activity-hero__content">
        <div class="activity-hero__inner">
          <h2 class="activity-label activity-label--conference">CONFERENCE</h2>
          <a href="./conference.html" class="activity-btn">LEARN MORE</a>
        </div>
      </div>
    </article>

    <article class="activity-hero activity-hero--launch">
      <img
        src="../source/overview/IMG_0651.jpg"
        alt="전국대학교로켓발사대회 대표 이미지"
        class="activity-hero__image"
      />
      <div class="activity-hero__content">
        <div class="activity-hero__inner">
          <h2 class="activity-label activity-label--launch">LAUNCH</h2>
          <a href="./launch.html" class="activity-btn">LEARN MORE</a>
        </div>
      </div>
    </article>

  </section>
</main>

      <div data-shared-footer></div>
    </div>
  </body>
</html>
