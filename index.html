<script>
  (function () {
    const counters = document.querySelectorAll(".count-up");
    if (!counters.length) return;

    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (prefersReducedMotion) {
      counters.forEach((counter) => {
        counter.textContent = counter.dataset.target;
      });
      return;
    }

    const animateCounter = (el) => {
      const target = parseInt(el.dataset.target, 10);
      const duration = 1200;
      const startTime = performance.now();

      function update(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const value = Math.floor(target * eased);
        el.textContent = String(value).padStart(String(el.dataset.target).length, "0");

        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          el.textContent = el.dataset.target;
        }
      }

      requestAnimationFrame(update);
    };

    const observer = new IntersectionObserver(
      (entries, obs) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            animateCounter(entry.target);
            obs.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.4 }
    );

    counters.forEach((counter) => observer.observe(counter));
  })();


</script>

    <script>
      (function() {
        const slides = document.querySelectorAll('.slide-img');
        let current = 0;
        function showSlide(idx) {
          slides.forEach((img, i) => {
            img.style.opacity = (i === idx) ? '1' : '0';
            img.style.zIndex = (i === idx) ? '1' : '0';
          });
          current = idx;
        }
        function nextSlide() {
          showSlide((current + 1) % slides.length);
        }
        showSlide(0);
        setInterval(nextSlide, 3000);
      })();
    </script>

<script>
  (function () {
    const data = window.NURA_DATA;
    if (!data) return;

    const newsContainer = document.getElementById("news-list");
    const statsContainer = document.getElementById("stats-list");

    if (newsContainer) {
      newsContainer.innerHTML = data.newsItems
        .map(
          (item) => `
            <article class="rounded-3xl border border-white/10 bg-white/5 overflow-hidden hover:border-blue-400/40 transition">
              <a href="${item.href}" target="_blank" rel="noopener noreferrer" class="block h-full">
                <div class="aspect-[16/10] overflow-hidden bg-gray-900">
                  <img
                    src="${item.image}"
                    alt="${item.title}"
                    class="w-full h-full object-cover"
                    loading="lazy"
                  />
                </div>

                <div class="p-6">
                  <div class="text-sm text-gray-500 mb-3">${item.date}</div>

                  <h3 class="text-xl font-bold text-white leading-snug">
                    ${item.title}
                  </h3>

                  <p class="mt-4 text-gray-400 leading-7">
                    ${item.summary}
                  </p>

                  <span class="mt-6 inline-flex text-sm font-semibold text-blue-300 hover:text-blue-200">
                    기사 보기 →
                  </span>
                </div>
              </a>
            </article>
          `
        )
        .join("");
    }

    if (statsContainer) {
      statsContainer.innerHTML = data.overviewStats
        .map(
          (item) => `
            <article class="rounded-3xl border border-white/10 bg-white/5 p-6 md:p-7">
              <p class="text-sm text-gray-500">${item.basis}</p>
              <h3 class="mt-3 text-lg font-semibold text-gray-200">${item.label}</h3>
              <p class="mt-5 text-4xl md:text-5xl font-extrabold tracking-[-0.03em] text-white">
                <span class="count-up text-blue-300" data-target="${item.value}">0</span><span class="text-white">${item.unit}</span>
              </p>
            </article>
          `
        )
        .join("");

      const counters = statsContainer.querySelectorAll(".count-up");
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      function animateCounter(el) {
        const target = parseInt(el.dataset.target, 10);
        const duration = 1400;
        const startTime = performance.now();

        function update(now) {
          const progress = Math.min((now - startTime) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = Math.floor(target * eased);

          el.textContent = current.toLocaleString();

          if (progress < 1) {
            requestAnimationFrame(update);
          } else {
            el.textContent = target.toLocaleString();
          }
        }

        requestAnimationFrame(update);
      }

      if (prefersReducedMotion) {
        counters.forEach((el) => {
          el.textContent = parseInt(el.dataset.target, 10).toLocaleString();
        });
      } else {
        const observer = new IntersectionObserver(
          (entries, obs) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                animateCounter(entry.target);
                obs.unobserve(entry.target);
              }
            });
          },
          {
            threshold: 0.35
          }
        );

        counters.forEach((counter) => observer.observe(counter));
      }
    }
  })();


</script>
