          <li><a href="#activities" class="sidebar-link" data-section="activities">주요 활동<br><span class="text-xs text-gray-400">Activities</span></a></li>
          <li><a href="#sponsors" class="sidebar-link" data-section="sponsors">후원사<br><span class="text-xs text-gray-400">Sponsors</span></a></li>
          <li><a href="#resources" class="sidebar-link" data-section="resources">자료실<br><span class="text-xs text-gray-400">Resources</span></a></li>

      <!-- Main Content -->

        <!-- Overview Section -->
        <section id="overview" class="relative overflow-hidden flex flex-col justify-center min-h-0 h-screen w-full p-0 m-0">
          <!-- 배경 슬라이드 이미지들 (본문 전체를 덮음) -->

            <img src="source/overview/blurred/slide1.jpg" class="slide-img absolute inset-0 w-full h-full object-cover opacity-100 transition-opacity duration-[1500ms]" style="z-index:1;" alt="슬라이드1">
            <img src="source/overview/blurred/slide2.jpg" class="slide-img absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-[1500ms]" style="z-index:0;" alt="슬라이드2">
            <img src="source/overview/blurred/slide3.jpg" class="slide-img absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-[1500ms]" style="z-index:0;" alt="슬라이드3">
            <img src="source/overview/blurred/slide4.jpg" class="slide-img absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-[1500ms]" style="z-index:0;" alt="슬라이드4">
            <img src="source/overview/blurred/slide5.jpg" class="slide-img absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-[1500ms]" style="z-index:0;" alt="슬라이드5">
            <img src="source/overview/blurred/slide6.jpg" class="slide-img absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-[1500ms]" style="z-index:0;" alt="슬라이드6">
            <img src="source/overview/blurred/slide7.jpg" class="slide-img absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-[1500ms]" style="z-index:0;" alt="슬라이드7">
            <img src="source/overview/blurred/slide8.jpg" class="slide-img absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-[1500ms]" style="z-index:0;" alt="슬라이드8">
            <img src="source/overview/blurred/slide9.jpg" class="slide-img absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-[1500ms]" style="z-index:0;" alt="슬라이드9">
            <img src="source/overview/blurred/slide10.jpg" class="slide-img absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-[1500ms]" style="z-index:0;" alt="슬라이드10">
            <img src="source/overview/blurred/slide11.jpg" class="slide-img absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-[1500ms]" style="z-index:0;" alt="슬라이드11">
            <!-- 어두운 오버레이 -->
            <div class="absolute inset-0 bg-black/60 z-10"></div>
          </div>
          <!-- 텍스트 컨텐츠 -->
          <div class="relative z-30 flex items-center justify-center h-full w-full text-white">

          </div>
        </section>
        <!-- About Section -->
        <section id="about" class="py-20 border-t border-gray-800">

        <!-- Activities Section -->

        </section>
        <!-- Sponsors Section -->
        <section id="sponsors" class="py-20 border-t border-gray-800">

          <div id="sponsor-wall" class="mt-4 px-8 py-6 grid grid-cols-[repeat(auto-fit,minmax(200px,1fr))] gap-8"></div>
        </section>
        <!-- Resources Section -->
        <section id="resources" class="py-20 border-t border-gray-800">

    </div>
    
    <!-- Footer -->

        <div class="max-w-6xl mx-auto">

          <!-- Organization Info -->
          <div></div>
          
          <!-- Contact Details -->
          <div></div>
          
          <!-- Business Info -->

        <div class="border-t border-gray-800 mt-8 pt-8 text-center pb-2 md:pb-8">

    <!-- Mobile Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-gray-900 flex md:hidden justify-around py-4 z-50 border-t border-gray-800">
      <a href="#overview" class="sidebar-link px-2" data-section="overview">개요</a>
      <a href="#about" class="sidebar-link px-2" data-section="about">소개</a>
      <a href="#activities" class="sidebar-link px-2" data-section="activities">활동</a>
      <a href="#sponsors" class="sidebar-link px-2" data-section="sponsors">후원</a>
      <a href="#resources" class="sidebar-link px-2" data-section="resources">자료</a>
    </nav>
    <script>
      // 콘텐츠 데이터를 직접 포함
      const contentData = {
        "overview": {
          "title": "전국대학교로켓연합회",
          "subtitle": "National University Rocket Association",
          "description": "로켓 기술 교류를 촉진하고 대학생들의 발사 활동을 지원합니다."
        },
        "about": {
          "title": "단체 소개",
          "subtitle": "About",
          "description": "NURA는 대학의 로켓 정보 교류 및 활동, 로켓 발사대회 경진을 목표로 설립되었습니다. 1992년 한국항공대에서 로켓 발사 대회가 개최된 것을 시작으로 1993년 각 대학의 로켓 정보 교류 및 활동을 위한 전국 로켓 연구 연합회가 창설 되었으며 그 후, 2001년 정식으로 전국 대학교 로켓 연합회를 발족하였습니다."
        },
        "activities": {
          "title": "주요 활동",
          "subtitle": "Activities",
          "categories": [
            {
              "title": "학술대회",
              "items": [
                "로켓 설계 및 제작 과정 발표",
                "자체 개발 기술 소개 및 세미나",
                "리크루팅 부스 및 참여자 교류"
              ]
            },
            {
              "title": "발사대회",
              "items": [
                "자체 설계한 로켓의 실제 발사 및 비행 실험",
                "평가/비평가 로켓 운영을 통한 기술 구현 및 검증",
                "비행 안정성, 구조 완성도 등에 따른 심사 및 시상"
              ]
            },
            {
              "title": "추진공학회",
              "items": [
                "항공우주 분야 기술 교류 학회 참여",
                "로켓 및 추진기술 논문 세션 운영",
                "리크루팅 부스 및 산학 협력 활동"
              ]
            },
            {
              "title": "기타 활동",
              "items": [
                "학술대회 연계 교류회 및 네트워킹 행사",
                "로켓 기술 관련 공동 워크숍 및 기획 세션",
                "산학 연계 기회 탐색 및 외부 행사 참여"
              ]
            }
          ]
        },
        "sponsors": {
          "title": "후원사",
          "subtitle": "Sponsors",
          "description": "NURA의 활동을 후원해주시는 기업 및 기관들입니다.",
          "sponsors": [
            {
              "name": "대한항공",
              "logo": "source/sponsors/koreanair.png",
              "url": "https://www.koreanair.com",
              "ratio": 2.8
            },
            {
              "name": "이노스페이스",
              "logo": "source/sponsors/innospace.png",
              "url": "https://www.innospc.com",
              "ratio": 2.5
            },
            {
              "name": "한국항공우주연구원",
              "logo": "source/sponsors/kari.jpg",
              "url": "https://www.kari.re.kr",
              "ratio": 1.1
            },
            {
              "name": "LIG풍산",
              "logo": "source/sponsors/ligpoongsan.png",
              "url": "https://www.ligpoongsan.co.kr",
              "ratio": 2.0
            }
          ]
        },
        "footer": {
          "organization": {
            "name": "NURA",
            "fullName": "전국대학교로켓연합회",
            "englishName": "National University Rocket Association"
          },
          "contact": {
            "title": "연락처",
            "items": [
              {
                "label": "Email",
                "value": "nurarocketscience@gmail.com"
              },
              {
                "label": "Instagram",
                "value": "@nura._.official"
              },
              {
                "label": "Address",
                "value": "경기도 고양시 덕양구 항공대학로 76"
              }
            ]
          },
          "business": {
            "title": "사업자 정보",
            "items": [
              {
                "label": "사업자등록번호",
                "value": "609-82-83482"
              },
              {
                "label": "대표자",
                "value": "전하상"
              },
              {
                "label": "설립일",
                "value": "1992년 3월 2일"
              }
            ]
          },
          "copyright": "© 1992 NURA. All rights reserved."
        },
        "resources": {
          "gallery": {
            "title": "갤러리",
            "description": "NURA의 활동 사진, 대회 사진 등은 아래 원드라이브 공유 폴더에서 확인하실 수 있습니다.",
            "buttonText": "NURA 갤러리 바로가기",
            "buttonIcon": "🖼️",
            "url": "https://onedrive.live.com/your-shared-gallery-link",
            "bgImage": "source/resources/onedrive-blur.png"
          },
          "document": {
            "title": "문서실",
            "description": "NURA의 기술, 역사 등에 관한 각종 문서는 아래 노션 페이지에서 확인하실 수 있습니다.",
            "buttonText": "NURA 노션 바로가기",
            "buttonIcon": "📄",
            "url": "https://www.notion.so/nura/NURA-Resources",
            "bgImage": "source/resources/notion-blur.png"
          },
          "subtitle": "Resources"
        },
      };
      
      // 페이지 로드 시 내용 업데이트
      function loadContent() {
        updateContent();
      }
      
      // 페이지 내용 업데이트
      function updateContent() {
        // Overview 섹션
        const overviewSection = document.getElementById('overview');
        if (overviewSection && contentData.overview) {
          const title = overviewSection.querySelector('h1');
          const description = overviewSection.querySelector('p');
          
          title.innerHTML = `<span class= "text-blue-400">${contentData.overview.title}</span><br><span class="text-lg font-normal text-gray-400">${contentData.overview.subtitle}</span>`;
          description.textContent = contentData.overview.description;
        }
        
        // About 섹션
        const aboutSection = document.getElementById('about');
        if (aboutSection && contentData.about) {
          const title = aboutSection.querySelector('h2');
          const description = aboutSection.querySelector('p');
          
          title.innerHTML = `${contentData.about.title} <span class="text-lg text-gray-400">${contentData.about.subtitle}</span>`;
          description.textContent = contentData.about.description;
        }
        
        // Activities 섹션
        const activitiesSection = document.getElementById('activities');
        if (activitiesSection && contentData.activities) {
          const title = activitiesSection.querySelector('h2');
          const cards = document.getElementById('activities-cards');
          title.innerHTML = `${contentData.activities.title} <span class="text-lg text-gray-400">${contentData.activities.subtitle}</span>`;
          if (cards && contentData.activities.categories) {
            cards.innerHTML = contentData.activities.categories.map(cat => `
              <div class="bg-gray-900 rounded-xl shadow p-6 flex flex-col">
                <h3 class="text-xl font-bold mb-2 text-blue-300">${cat.title}</h3>
                <ul class="list-disc pl-5 text-gray-300 text-sm">
                  ${cat.items.map(item => `<li>${item}</li>`).join('')}
                </ul>
              </div>
            `).join('');
          }
        }
        
        // Sponsors 섹션 (Activities 카드와 동일한 스타일)
        function renderSponsorWall() {
          const sponsorsSection = document.getElementById('sponsors');
          if (!sponsorsSection || !contentData.sponsors) return;
          const title = sponsorsSection.querySelector('h2');
          const wall = document.getElementById('sponsor-wall');
          title.innerHTML = `${contentData.sponsors.title} <span class="text-lg text-gray-400">${contentData.sponsors.subtitle}</span>`;
          if (wall && contentData.sponsors.sponsors) {
            wall.innerHTML = contentData.sponsors.sponsors.map(sponsor => `
              <div class="bg-white rounded-xl shadow p-6 flex flex-col items-center justify-center">
                <a href="${sponsor.url}" target="_blank" rel="noopener noreferrer">
                  <img src="${sponsor.logo}" alt="${sponsor.name} 로고" class="max-w-full max-h-24 object-contain" />
                </a>
              </div>
            `).join('');
          }
        }
        window.addEventListener('load', renderSponsorWall);
        window.addEventListener('resize', renderSponsorWall);
        
        // Resources 섹션 렌더링
        const resourcesSection = document.getElementById('resources');
        if (resourcesSection && contentData.resources && contentData.resources.gallery && contentData.resources.document) {
          const title = resourcesSection.querySelector('h2');
          const content = document.getElementById('resources-content');
          title.innerHTML = `${contentData.resources.title || '자료실'} <span class="text-lg text-gray-400">${contentData.resources.subtitle}</span>`;
          content.innerHTML = `
            <div class="flex flex-col md:flex-row gap-8 items-stretch w-full">
              <!-- 갤러리 카드 (원드라이브 링크) -->
              <div class="resource-card flex-1 min-h-[260px] bg-white/80 rounded-xl shadow overflow-hidden flex flex-col items-center justify-center p-10 relative">
                <img src="${contentData.resources.gallery.bgImage}" alt="Gallery" class="absolute inset-0 w-full h-full object-cover opacity-30 pointer-events-none" />
                <div class="relative z-10 flex flex-col items-center">
                  <h3 class="text-2xl font-bold mb-4 text-gray-900">${contentData.resources.gallery.title}</h3>
                  <p class="text-gray-700 mb-6 text-center">${contentData.resources.gallery.description}</p>
                  <a href="${contentData.resources.gallery.url}" target="_blank" rel="noopener noreferrer"
                     class="inline-flex items-center bg-blue-600 text-white font-bold px-6 py-3 rounded-lg shadow hover:bg-blue-700 transition">
                    <span class="text-2xl mr-2">${contentData.resources.gallery.buttonIcon}</span> ${contentData.resources.gallery.buttonText}
                  </a>
                </div>
              </div>
              <!-- 문서실 안내 카드 -->
              <div class="resource-card flex-1 min-h-[260px] bg-white/80 rounded-xl shadow overflow-hidden flex flex-col items-center justify-center p-10 relative">
                <img src="${contentData.resources.document.bgImage}" alt="Notion" class="absolute inset-0 w-full h-full object-cover opacity-30 pointer-events-none" />
                <div class="relative z-10 flex flex-col items-center">
                  <h3 class="text-2xl font-bold mb-4 text-gray-900">${contentData.resources.document.title}</h3>
                  <p class="text-gray-700 mb-6 text-center">${contentData.resources.document.description}</p>
                  <a href="${contentData.resources.document.url}" target="_blank" rel="noopener noreferrer"
                     class="inline-flex items-center bg-blue-600 text-white font-bold px-6 py-3 rounded-lg shadow hover:bg-blue-700 transition">
                    <span class="text-2xl mr-2">${contentData.resources.document.buttonIcon}</span> ${contentData.resources.document.buttonText}
                  </a>
                </div>
              </div>
            </div>
          `;
        }
        
        // Footer 업데이트
        updateFooter();
      }
      
      // Footer 내용 업데이트
      function updateFooter() {
        if (!contentData.footer) return;
        
        const footer = document.querySelector('footer');
        if (!footer) return;
        
        const orgInfo = footer.querySelector('.grid > div:nth-child(1)');
        const contactInfo = footer.querySelector('.grid > div:nth-child(2)');
        const businessInfo = footer.querySelector('.grid > div:nth-child(3)');
        const copyright = footer.querySelector('.border-t p');
        
        // Organization Info
        if (orgInfo && contentData.footer.organization) {
          orgInfo.innerHTML = `
            <h3 class="text-lg font-bold mb-4 text-blue-400">${contentData.footer.organization.name}</h3>
            <p class="text-gray-400 text-sm mb-2">${contentData.footer.organization.fullName}</p>
            <p class="text-gray-400 text-sm mb-2">${contentData.footer.organization.englishName}</p>
          `;
        }
        
        // Contact Info
        if (contactInfo && contentData.footer.contact) {
          contactInfo.innerHTML = `
            <h3 class="text-lg font-bold mb-4">${contentData.footer.contact.title}</h3>
            <div class="text-gray-400 text-sm space-y-2">
              ${contentData.footer.contact.items.map(item => 
                item.label === 'Email'
                  ? `<p class='break-all'>${item.label}: ${item.value}</p>`
                  : `<p>${item.label}: ${item.value}</p>`
              ).join('')}
            </div>
          `;
        }
        
        // Business Info
        if (businessInfo && contentData.footer.business) {
          businessInfo.innerHTML = `
            <h3 class="text-lg font-bold mb-4">${contentData.footer.business.title}</h3>
            <div class="text-gray-400 text-sm space-y-2">
              ${contentData.footer.business.items.map(item => 
                `<p>${item.label}: ${item.value}</p>`
              ).join('')}
            </div>
          `;
        }
        
        // Copyright
        if (copyright && contentData.footer.copyright) {
          copyright.textContent = contentData.footer.copyright;
        }
      }
      
      // Active section highlight (scroll 성능 최적화)
      const links = document.querySelectorAll('.sidebar-link');
      const sections = Array.from(document.querySelectorAll('section'));
      let sectionMetrics = [];
      let ticking = false;

      function cacheSectionMetrics() {
        sectionMetrics = sections.map(section => ({
          id: section.id,
          top: Math.round(section.getBoundingClientRect().top + window.scrollY),
          height: section.offsetHeight
        }));
      }

      function setActiveLink(targetSectionId) {
        links.forEach(link => {
          if (link.dataset.section === targetSectionId) {
            link.classList.add('text-blue-400', 'font-bold');
          } else {
            link.classList.remove('text-blue-400', 'font-bold');
          }
        });
      }

      function onScroll() {
        const scrollPos = window.scrollY;
        const windowHeight = window.innerHeight;
        const documentHeight = document.documentElement.scrollHeight;

        // 스크롤이 거의 끝에 도달했을 때 resources 섹션 활성화
        if (scrollPos + windowHeight >= documentHeight - 100) {
          setActiveLink('resources');
          return;
        }

        let current = sectionMetrics[0]?.id || 'overview';
        for (const section of sectionMetrics) {
          // 섹션의 중간이 화면 상단에 닿을 때까지 활성화 유지
          if (scrollPos >= section.top - windowHeight / 2 && scrollPos < section.top + section.height - windowHeight / 2) {
            current = section.id;
          }
        }

        setActiveLink(current);
      }

      function requestScrollUpdate() {
        if (ticking) return;
        ticking = true;
        window.requestAnimationFrame(() => {
          onScroll();
          ticking = false;
        });
      }
      
      // 페이지 로드 시 내용 불러오기
      document.addEventListener('DOMContentLoaded', () => {
        loadContent();
        cacheSectionMetrics();
        requestScrollUpdate();
      });
      
      window.addEventListener('load', cacheSectionMetrics);
      window.addEventListener('resize', () => {
        cacheSectionMetrics();
        requestScrollUpdate();
      });
      window.addEventListener('scroll', requestScrollUpdate, { passive: true });
      // Smooth scroll for anchor links (for Safari)
      links.forEach(link => {
        link.addEventListener('click', e => {
          const href = link.getAttribute('href');
          if (href.startsWith('#')) {
            e.preventDefault();
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            document.querySelector(href).scrollIntoView({ behavior: prefersReducedMotion ? 'auto' : 'smooth' });
          }
        });
      });
    </script>
    <!-- 슬라이드쇼 기능 -->
    <script>
      (function() {
        const slides = document.querySelectorAll('.slide-img');
        let current = 0;
        let timer = null;

        function showSlide(idx) {
          slides.forEach((img, i) => {
            img.style.opacity = (i === idx) ? '1' : '0';
            img.style.zIndex = (i === idx) ? '1' : '0';
          });
          current = idx;
        }
        function nextSlide() {
          showSlide((current + 1) % slides.length);
        }
        function startAuto() {
          timer = setInterval(nextSlide, 3000);
        }
        function stopAuto() {
          clearInterval(timer);
        }
        // 자동만, 수동조작 없음
        showSlide(0);
        startAuto();
      })();
    </script>
  </body>
</html>
