    <script src="./assets/js/layout.js"></script>
    
<script>
  (function() {
    const slides = document.querySelectorAll('.hero-slide');
    let current = 0;
    function showSlide(idx) {
      slides.forEach((img, i) => img.classList.toggle('is-active', i === idx));
      current = idx;
    }
    if (slides.length) {
      showSlide(0);
      setInterval(() => showSlide((current + 1) % slides.length), 3000);
    }
  })();

  (function() {
    const data = window.NURA_DATA || {};
    const newsContainer = document.getElementById('news-list');
    const statsContainer = document.getElementById('stats-list');

    if (newsContainer) {
      const news = Array.isArray(data.newsArticles) ? data.newsArticles : [];
      if (!news.length) {
        newsContainer.innerHTML = `<article class="rounded-3xl border border-white/10 bg-white/5 p-6"><p class="text-white/60">data/site-data.js의 newsArticles 배열을 추가해 주세요.</p></article>`;
      } else {
        newsContainer.innerHTML = news.map((item) => `
          <article class="rounded-3xl border border-white/10 bg-white/5 p-6 md:p-7">
            <p class="text-sm text-gray-500">${item.date || ''}</p>
            <h3 class="mt-3 text-xl font-semibold text-white break-keep">${item.title || ''}</h3>
            <p class="mt-3 text-gray-400 leading-7 break-keep">${item.description || ''}</p>
            <a href="${item.href || '#'}" target="_blank" rel="noopener noreferrer" class="mt-6 inline-flex items-center gap-2 rounded-full border border-white/20 px-4 py-2 text-sm font-semibold text-white transition hover:bg-white hover:text-black">기사 보기 <span aria-hidden="true">↗</span></a>
          </article>`).join('');
      }
    }

    if (statsContainer) {
      const stats = Array.isArray(data.overviewStats) ? data.overviewStats : [];
      if (!stats.length) {
        statsContainer.innerHTML = `<article class="rounded-3xl border border-white/10 bg-white/5 p-6"><p class="text-white/60">data/site-data.js의 overviewStats 배열을 추가해 주세요.</p></article>`;
      } else {
        statsContainer.innerHTML = stats.map((item) => `
          <article class="rounded-3xl border border-white/10 bg-white/5 p-6 md:p-7">
            <p class="text-sm text-gray-500">${item.basis || ''}</p>
            <h3 class="mt-3 text-lg font-semibold text-gray-200">${item.label || ''}</h3>
            <p class="mt-5 text-4xl md:text-5xl font-extrabold tracking-[-0.03em] text-white"><span class="count-up text-blue-300" data-target="${item.value || 0}">0</span><span class="text-white">${item.unit || ''}</span></p>
          </article>`).join('');

        const counters = statsContainer.querySelectorAll('.count-up');
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        function animateCounter(el) {
          const target = parseInt(el.dataset.target, 10) || 0;
          const duration = 1400;
          const startTime = performance.now();
          function update(now) {
            const progress = Math.min((now - startTime) / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            const current = Math.floor(target * eased);
            el.textContent = current.toLocaleString();
            if (progress < 1) requestAnimationFrame(update);
            else el.textContent = target.toLocaleString();
          }
          requestAnimationFrame(update);
        }
        if (prefersReducedMotion) counters.forEach((el) => el.textContent = (parseInt(el.dataset.target, 10) || 0).toLocaleString());
        else {
          const observer = new IntersectionObserver((entries, obs) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                animateCounter(entry.target);
                obs.unobserve(entry.target);
              }
            });
          }, { threshold: 0.35 });
          counters.forEach((counter) => observer.observe(counter));
        }
      }
    }
  })();
</script>
